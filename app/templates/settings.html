{% extends "base.html" %}
{% set active_page = "settings" %}

{% block title %}설정 - 커머스리뷰{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-8">
        <h1 class="text-2xl font-bold text-white">API 키 설정</h1>
        <p class="text-gray-500 text-sm mt-1">Whisper 음성인식 및 GPT 번역에 사용할 API 키를 설정합니다</p>
    </div>

    <div class="bg-gray-900 border border-gray-800/50 rounded-2xl p-8">
        <form id="settingsForm">
            <!-- OpenAI API Key -->
            <div class="mb-6">
                <label for="openai_key" class="block text-sm font-medium text-gray-300 mb-2">
                    OpenAI API Key
                </label>
                <div class="relative">
                    <input type="password" id="openai_key" name="openai_key"
                           value="{{ openai_key or '' }}"
                           placeholder="sk-..."
                           class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition pr-12">
                    <button type="button" onclick="togglePassword(this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                    </button>
                </div>
                <p class="mt-2 text-xs text-gray-500">Whisper STT + GPT-4o 번역에 사용됩니다</p>
            </div>

            <!-- Actions -->
            <div class="flex gap-3">
                <button type="submit"
                        class="flex-1 py-3 px-4 bg-gradient-to-r from-violet-600 to-fuchsia-600 hover:from-violet-500 hover:to-fuchsia-500 text-white font-semibold rounded-xl transition-all duration-200">
                    저장
                </button>
                <button type="button" onclick="testConnection()"
                        class="px-6 py-3 bg-gray-800 hover:bg-gray-700 text-gray-300 font-medium rounded-xl transition-colors flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                    </svg>
                    연결 테스트
                </button>
            </div>
        </form>

        <!-- Test result -->
        <div id="testResult" class="hidden mt-4 p-3 rounded-lg text-sm"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function togglePassword(btn) {
        const input = btn.closest('.relative').querySelector('input');
        input.type = input.type === 'password' ? 'text' : 'password';
    }

    document.getElementById('settingsForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const key = document.getElementById('openai_key').value.trim();

        try {
            const resp = await fetch('/api/settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ openai_api_key: key })
            });
            if (resp.ok) {
                showResult('API 키가 저장되었습니다.', 'success');
            } else {
                showResult('저장에 실패했습니다.', 'error');
            }
        } catch (e) {
            showResult('네트워크 오류', 'error');
        }
    });

    async function testConnection() {
        const key = document.getElementById('openai_key').value.trim();
        if (!key) {
            showResult('API 키를 입력해주세요.', 'error');
            return;
        }

        showResult('연결 테스트 중...', 'info');

        try {
            const resp = await fetch('/api/settings/test', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ openai_api_key: key })
            });
            const data = await resp.json();
            if (resp.ok && data.ok) {
                showResult('OpenAI API 연결 성공!', 'success');
            } else {
                showResult(data.detail || 'API 연결에 실패했습니다.', 'error');
            }
        } catch (e) {
            showResult('네트워크 오류', 'error');
        }
    }

    function showResult(msg, type) {
        const el = document.getElementById('testResult');
        el.classList.remove('hidden', 'bg-green-500/10', 'border-green-500/20', 'text-green-400',
                           'bg-red-500/10', 'border-red-500/20', 'text-red-400',
                           'bg-blue-500/10', 'border-blue-500/20', 'text-blue-400');

        if (type === 'success') {
            el.classList.add('bg-green-500/10', 'border', 'border-green-500/20', 'text-green-400');
        } else if (type === 'error') {
            el.classList.add('bg-red-500/10', 'border', 'border-red-500/20', 'text-red-400');
        } else {
            el.classList.add('bg-blue-500/10', 'border', 'border-blue-500/20', 'text-blue-400');
        }

        el.textContent = msg;
        el.classList.remove('hidden');
    }
</script>
{% endblock %}
